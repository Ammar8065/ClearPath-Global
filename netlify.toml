# Static deploy of the UI only. The FastAPI backend (evaluations, AI, RAG,
# PDF reports) does not run on Netlify — API calls from the page will fail
# unless the backend is hosted elsewhere and proxied.
[build]
  publish = "."
  command = ""

# index.html loads its assets from /static/... (FastAPI routes). On Netlify
# the files live at the site root — rewrite so the same HTML works on both.
[[redirects]]
  from = "/static/*"
  to = "/:splat"
  status = 200

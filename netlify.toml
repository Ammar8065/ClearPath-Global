# Netlify serves the static UI; API calls are proxied to the FastAPI
# backend on Render (see render.yaml). Netlify serves real files first,
# so only non-file paths (the API routes) hit the proxy.
[build]
  publish = "."
  command = ""

# index.html loads its assets from /static/... (FastAPI routes). On Netlify
# the files live at the site root — rewrite so the same HTML works on both.
[[redirects]]
  from = "/static/*"
  to = "/:splat"
  status = 200

# Everything that isn't a static file is an API call — forward it to the
# Render backend. Update the host below if the Render service URL differs.
[[redirects]]
  from = "/*"
  to = "https://clearpath-global.onrender.com/:splat"
  status = 200

services:
  - type: web
    name: clearpath-global
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: ANTHROPIC_API_KEY
        sync: false
